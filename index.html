<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ember — burner chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1c1b19;
    --bg-elev:#26221e;
    --bg-elev2:#2f2a24;
    --ember:#ff6b35;
    --ember-soft:#f2a65a;
    --ash:#8a8378;
    --ash-dim:#5c574e;
    --text:#ede8e0;
    --char:#c1440e;
    --border:#3a342c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .app{
    width:100%;
    max-width:440px;
    background:var(--bg-elev);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    min-height:560px;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  /* ---------- Landing ---------- */
  .screen{padding:32px 24px;display:flex;flex-direction:column;gap:16px;flex:1;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .ember-dot{
    width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--ember-soft), var(--ember) 60%, var(--char) 100%);
    box-shadow:0 0 10px var(--ember);
    animation:flicker 2.4s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes flicker{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:.6; transform:scale(.85);}
  }
  h1{font-family:'JetBrains Mono',monospace;font-size:20px;margin:0;letter-spacing:.5px;}
  .tagline{color:var(--ash);font-size:13px;margin:0 0 8px;line-height:1.5;}
  .btn{
    border:none;border-radius:10px;padding:14px 16px;font-size:15px;font-weight:600;
    cursor:pointer;font-family:'Inter',sans-serif;transition:filter .15s, transform .1s;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--ember);color:#1c1b19;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--ember-soft);}
  .btn-danger{background:transparent;border:1px solid var(--char);color:var(--char);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--ash);text-transform:uppercase;letter-spacing:.6px;}
  .field input{
    background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;
    outline:none;
  }
  .field input:focus{border-color:var(--ember-soft);}
  .error{color:var(--char);font-size:13px;min-height:16px;}
  .back{background:none;border:none;color:var(--ash);cursor:pointer;font-size:13px;padding:0;text-align:left;}
  .back:hover{color:var(--text);}
  .code-box{
    background:var(--bg);border:1px dashed var(--ember-soft);border-radius:10px;
    padding:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .code-box .val{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:2px;color:var(--ember-soft);}
  .copy{background:none;border:none;color:var(--ash);cursor:pointer;font-size:12px;text-decoration:underline;}
  .hint{font-size:12px;color:var(--ash-dim);line-height:1.5;}
  .spinner{
    width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--ember);
    border-radius:50%;animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .waiting-row{display:flex;align-items:center;gap:10px;color:var(--ash);font-size:13px;}

  /* ---------- Chat ---------- */
  .chat-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg-elev2);
  }
  .chat-header .room{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:13px;}
  .burn-timer{font-size:11px;color:var(--ash);}
  .header-actions{display:flex;gap:8px;}
  .icon-btn{
    background:none;border:1px solid var(--border);color:var(--ash);border-radius:8px;
    padding:6px 10px;font-size:12px;cursor:pointer;
  }
  .icon-btn:hover{color:var(--text);border-color:var(--ember-soft);}
  .messages{
    flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;
    max-height:420px;
  }
  .msg-row{display:flex;flex-direction:column;max-width:78%;}
  .msg-row.mine{align-self:flex-end;align-items:flex-end;}
  .msg-row.theirs{align-self:flex-start;align-items:flex-start;}
  .bubble{
    padding:9px 12px;border-radius:12px;font-size:14px;line-height:1.4;
    cursor:pointer;user-select:none;position:relative;animation:char-in .25s ease-out;
  }
  @keyframes char-in{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .mine .bubble{background:#33291f;border:1px solid var(--ember);border-bottom-right-radius:3px;}
  .theirs .bubble{background:var(--bg-elev2);border:1px solid var(--border);border-bottom-left-radius:3px;}
  .bubble img{max-width:100%;border-radius:8px;display:block;margin-top:4px;}
  .msg-meta{font-size:10px;color:var(--ash-dim);margin-top:3px;}
  .system-msg{
    align-self:center;font-size:11px;color:var(--ash);font-family:'JetBrains Mono',monospace;
    background:var(--bg);border:1px solid var(--border);padding:4px 10px;border-radius:20px;
  }
  .saved-flag{color:var(--ember-soft);}
  .composer{
    display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--bg-elev2);
  }
  .composer input[type=text]{
    flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;
    padding:10px 14px;color:var(--text);font-size:14px;outline:none;
  }
  .composer input[type=text]:focus{border-color:var(--ember-soft);}
  .round-btn{
    width:38px;height:38px;border-radius:50%;border:none;background:var(--ember);
    color:#1c1b19;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .round-btn.outline{background:transparent;border:1px solid var(--border);color:var(--ash);}
  .toast{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    background:var(--bg-elev2);border:1px solid var(--ember-soft);color:var(--text);
    padding:8px 16px;border-radius:20px;font-size:12px;z-index:20;
    animation:toast-in .2s ease-out;
  }
  @keyframes toast-in{from{opacity:0;transform:translate(-50%,-8px);}to{opacity:1;transform:translate(-50%,0);}}
  .saved-panel{
    position:absolute;inset:0;background:var(--bg-elev);z-index:30;display:flex;flex-direction:column;
  }
  .saved-panel .messages{max-height:none;}
  .empty-state{color:var(--ash-dim);font-size:13px;text-align:center;padding:30px 10px;}
  input[type=file]{display:none;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const S = window.storage;
const app = document.getElementById('app');

let state = 'landing'; // landing | create | join | waiting | chat
let myRole = null;      // 'host' | 'guest'
let roomId = null;
let roomPassword = null;
let pollTimer = null;
let lastMsgCount = 0;
let toastTimer = null;
let showSaved = false;

// ---------- helpers ----------
function genId(len){
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // no ambiguous chars
  let s = '';
  for(let i=0;i<len;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function fmtRemaining(ms){
  if(ms <= 0) return 'burned out';
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  return h > 0 ? `${h}h ${m}m left` : `${m}m left`;
}
function fmtTime(ts){
  return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
async function safeGet(key, shared){
  try{
    const r = await S.get(key, shared);
    return r ? r.value : null;
  }catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ await S.set(key, value, shared); }catch(e){}
}
async function safeDelete(key, shared){
  try{ await S.delete(key, shared); }catch(e){}
}

function showToast(msg){
  toastTimer && clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  el.id = 'live-toast';
  const existing = document.getElementById('live-toast');
  if(existing) existing.remove();
  document.querySelector('.app').appendChild(el);
  toastTimer = setTimeout(()=> el.remove(), 2500);
}

// ---------- storage ops ----------
async function getRoom(id){
  const raw = await safeGet(`room:${id}`, true);
  return raw ? JSON.parse(raw) : null;
}
async function setRoom(id, obj){
  await safeSet(`room:${id}`, JSON.stringify(obj), true);
}
async function getMsgs(id){
  const raw = await safeGet(`msgs:${id}`, true);
  return raw ? JSON.parse(raw) : [];
}
async function setMsgs(id, arr){
  await safeSet(`msgs:${id}`, JSON.stringify(arr), true);
}
async function getSaved(){
  const raw = await safeGet(`saved:${roomId}:${myRole}`, false);
  let arr = raw ? JSON.parse(raw) : [];
  const now = Date.now();
  const filtered = arr.filter(m => now - m.savedAt < 24*3600*1000);
  if(filtered.length !== arr.length){
    await safeSet(`saved:${roomId}:${myRole}`, JSON.stringify(filtered), false);
  }
  return filtered;
}
async function addSaved(msg){
  const raw = await safeGet(`saved:${roomId}:${myRole}`, false);
  let arr = raw ? JSON.parse(raw) : [];
  if(arr.find(m => m.id === msg.id)){ showToast('Already saved'); return; }
  arr.push({...msg, savedAt: Date.now()});
  await safeSet(`saved:${roomId}:${myRole}`, JSON.stringify(arr), false);
  showToast('Saved — expires in 24h');
}

// ---------- actions ----------
async function createRoom(customPassword, customId, errCb){
  let id = customId && customId.trim() ? customId.trim().toUpperCase() : genId(6);
  if(customId && customId.trim()){
    if(!/^[A-Z0-9]{3,12}$/.test(id)){
      errCb && errCb('Room ID must be 3-12 letters/numbers only.');
      return;
    }
    const existing = await getRoom(id);
    if(existing && Date.now() < existing.expiresAt){
      errCb && errCb('That room ID is already taken. Try another or generate one.');
      return;
    }
  }
  const pw = customPassword && customPassword.trim() ? customPassword.trim() : genId(8);
  const now = Date.now();
  const room = {
    password: pw, createdAt: now, expiresAt: now + 24*3600*1000,
    hostJoined: true, guestJoined: false, hostLeft: false, guestLeft: false
  };
  await setRoom(id, room);
  await setMsgs(id, []);
  roomId = id; roomPassword = pw; myRole = 'host';
  state = 'waiting';
  render();
  startPolling();
}

async function joinRoom(id, pw, errCb){
  id = id.trim().toUpperCase();
  const room = await getRoom(id);
  if(!room){ errCb('Room not found or already burned out.'); return; }
  if(Date.now() > room.expiresAt){ await cleanupRoom(id); errCb('This room expired.'); return; }
  if(room.password !== pw.trim()){ errCb('Wrong password.'); return; }
  if(room.guestJoined && !room.guestLeft){ errCb('This room already has two people in it.'); return; }
  room.guestJoined = true; room.guestLeft = false;
  await setRoom(id, room);
  const msgs = await getMsgs(id);
  msgs.push({id: genId(8), sender:'system', type:'text', content:'Guest joined the chat.', ts: Date.now()});
  await setMsgs(id, msgs);
  roomId = id; roomPassword = pw.trim(); myRole = 'guest';
  state = 'chat';
  render();
  startPolling();
}

async function sendMessage(type, content){
  const room = await getRoom(roomId);
  if(!room) return;
  const msgs = await getMsgs(roomId);
  msgs.push({id: genId(10), sender: myRole, type, content, ts: Date.now()});
  await setMsgs(roomId, msgs);
  render();
}

async function cleanupRoom(id){
  await safeDelete(`room:${id}`, true);
  await safeDelete(`msgs:${id}`, true);
}

async function leaveRoom(){
  const room = await getRoom(roomId);
  if(room){
    if(myRole === 'host') room.hostLeft = true; else room.guestLeft = true;
    if(room.hostLeft && room.guestLeft){
      await cleanupRoom(roomId);
    } else {
      await setRoom(roomId, room);
      const msgs = await getMsgs(roomId);
      msgs.push({id: genId(8), sender:'system', type:'text', content:`${myRole === 'host' ? 'Host' : 'Guest'} left the chat.`, ts: Date.now()});
      await setMsgs(roomId, msgs);
    }
  }
  stopPolling();
  resetLocal();
  render();
}

function resetLocal(){
  myRole = null; roomId = null; roomPassword = null; lastMsgCount = 0; showSaved = false;
  state = 'landing';
}

// ---------- polling ----------
function startPolling(){
  stopPolling();
  pollTimer = setInterval(pollTick, 2200);
  pollTick();
}
function stopPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}
async function pollTick(){
  if(!roomId) return;
  const room = await getRoom(roomId);
  if(!room){
    // room gone (expired/cleaned up by other party)
    showToast('This room has burned out.');
    stopPolling(); resetLocal(); render();
    return;
  }
  if(Date.now() > room.expiresAt){
    showToast('24 hours is up — room burned out.');
    await cleanupRoom(roomId);
    stopPolling(); resetLocal(); render();
    return;
  }
  const otherLeft = myRole === 'host' ? room.guestLeft : room.hostLeft;
  if(otherLeft){
    showToast(`${myRole === 'host' ? 'Guest' : 'Host'} left. Chat will disappear when you leave.`);
  }
  if(state === 'waiting' && room.guestJoined){
    showToast('Guest joined!');
    state = 'chat';
  }
  const msgs = await getMsgs(roomId);
  if(msgs.length > lastMsgCount && lastMsgCount !== 0){
    // new message arrived from other side (rough check)
  }
  lastMsgCount = msgs.length;
  window.__currentRoom = room;
  window.__currentMsgs = msgs;
  render();
}

// ---------- double-tap detection ----------
let lastTap = {id:null, time:0};
function handleBubbleTap(msg){
  const now = Date.now();
  if(lastTap.id === msg.id && now - lastTap.time < 350){
    addSaved(msg).then(render);
    lastTap = {id:null, time:0};
  } else {
    lastTap = {id: msg.id, time: now};
  }
}

// ---------- image upload ----------
function handleImagePick(e){
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 1.5*1024*1024){
    showToast('Image too large — keep it under 1.5MB.');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    sendMessage('image', reader.result);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ---------- render ----------
function render(){
  app.innerHTML = '';
  if(state === 'landing') return renderLanding();
  if(state === 'create') return renderCreate();
  if(state === 'join') return renderJoin();
  if(state === 'waiting') return renderWaiting();
  if(state === 'chat') return renderChat();
}

function renderLanding(){
  const el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = `
    <div class="brand"><span class="ember-dot"></span><h1>EMBER</h1></div>
    <p class="tagline">A two-person chat that burns out. No accounts, no history — messages live in the room only while it's open, and the whole thing self-destructs in 24 hours max.</p>
    <button class="btn btn-primary" id="go-create">Create a room</button>
    <button class="btn btn-outline" id="go-join">Join a room</button>
    <p class="hint">Double-tap a message to keep it for yourself (up to 24h). Everyone else still sees it disappear normally.</p>
  `;
  app.appendChild(el);
  el.querySelector('#go-create').onclick = () => { state='create'; render(); };
  el.querySelector('#go-join').onclick = () => { state='join'; render(); };
}

function renderCreate(){
  const el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = `
    <button class="back">&larr; back</button>
    <h1>Create room</h1>
    <p class="tagline">Leave a field blank to get a random value, or set your own for both room ID and password.</p>
    <div class="field">
      <label>Custom room ID (optional)</label>
      <input type="text" id="id-input" placeholder="e.g. NIGHTOWL" maxlength="12" style="text-transform:uppercase">
    </div>
    <div class="field">
      <label>Custom password (optional)</label>
      <input type="text" id="pw-input" placeholder="e.g. campfire92" maxlength="24">
    </div>
    <div class="error" id="create-err"></div>
    <button class="btn btn-primary" id="create-btn">Create room</button>
    <button class="btn btn-outline" id="random-btn">Generate everything randomly</button>
  `;
  app.appendChild(el);
  el.querySelector('.back').onclick = () => { state='landing'; render(); };
  const errCb = (msg) => { el.querySelector('#create-err').textContent = msg; };
  el.querySelector('#create-btn').onclick = () => {
    const pw = el.querySelector('#pw-input').value;
    const id = el.querySelector('#id-input').value;
    createRoom(pw, id, errCb);
  };
  el.querySelector('#random-btn').onclick = () => {
    createRoom('', '', errCb);
  };
}

function renderJoin(){
  const el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = `
    <button class="back">&larr; back</button>
    <h1>Join room</h1>
    <div class="field">
      <label>Room ID</label>
      <input type="text" id="id-input" placeholder="ABC123" maxlength="6" style="text-transform:uppercase">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="text" id="pw-input" placeholder="password">
    </div>
    <div class="error" id="join-err"></div>
    <button class="btn btn-primary" id="join-btn">Join</button>
  `;
  app.appendChild(el);
  el.querySelector('.back').onclick = () => { state='landing'; render(); };
  el.querySelector('#join-btn').onclick = () => {
    const id = el.querySelector('#id-input').value;
    const pw = el.querySelector('#pw-input').value;
    if(!id || !pw){ el.querySelector('#join-err').textContent = 'Enter both room ID and password.'; return; }
    joinRoom(id, pw, (msg) => { el.querySelector('#join-err').textContent = msg; });
  };
}

function renderWaiting(){
  const el = document.createElement('div');
  el.className = 'screen';
  el.innerHTML = `
    <div class="brand"><span class="ember-dot"></span><h1>Room ready</h1></div>
    <p class="tagline">Share these with the other person. They'll need both to get in.</p>
    <div class="code-box">
      <span class="val">${roomId}</span>
      <button class="copy" data-copy="${roomId}">copy ID</button>
    </div>
    <div class="code-box">
      <span class="val">${roomPassword}</span>
      <button class="copy" data-copy="${roomPassword}">copy pass</button>
    </div>
    <div class="waiting-row"><span class="spinner"></span> waiting for the other person to join...</div>
    <p class="hint">Only one guest can join. Once they're in, you'll be dropped straight into the chat.</p>
    <button class="btn btn-danger" id="cancel-btn">Cancel room</button>
  `;
  app.appendChild(el);
  el.querySelectorAll('.copy').forEach(b => {
    b.onclick = () => { navigator.clipboard.writeText(b.dataset.copy); showToast('Copied'); };
  });
  el.querySelector('#cancel-btn').onclick = async () => {
    await cleanupRoom(roomId);
    stopPolling(); resetLocal(); render();
  };
}

function renderChat(){
  const room = window.__currentRoom;
  const msgs = window.__currentMsgs || [];
  const remaining = room ? room.expiresAt - Date.now() : 0;

  const el = document.createElement('div');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  el.style.flex = '1';
  el.innerHTML = `
    <div class="chat-header">
      <div class="room"><span class="ember-dot" style="width:8px;height:8px;"></span>${roomId} · ${myRole === 'host' ? 'Host' : 'Guest'}</div>
      <div class="burn-timer">${fmtRemaining(remaining)}</div>
